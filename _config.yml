# Remote theme directory
remote_theme: analytics-link/analytics-link.github.io

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme

#-------------------------------
# General Site Settings
title: Maurice Ringer
description: "I'm a Product owner and Data Scientist, and this site shows a few projects that I have personally created. Please visit my Github & LinkedIn pages (or download my Resume) by using the links below."
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

#-------------------------------
# About Section
subtitle: Data Science <span style="color:#f58506"> Portfolio </span>
location: "Cambridge, UK"
resume_url: /docs/CV-Maurice-Ringer.pdf
avatar_image: /img/Maurice_Headshot_Pic0002_square.jpg

#-------------------------------
# Contact links
linkedln: "https://linkedln.com/mauriceringer/" # Add your linkedln handle
github: "https://github.com/mauriceringer/"  # Add your github handle

paginate: 6
paginate_path: "/page/:num"

sass:
  sass_dir: _sass
  style: compressed # possible values: nested expanded compact compressed

defaults:
  - scope:
      type: posts
    values:
      layout: post
      read_time: true
      share: false


